# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
      - alameda181
  workflow_dispatch:
    inputs:
      project:
        description: 'Select project to deploy'
        required: true
        default: 'TorresSanSebastian'
        type: choice
        options:
          - TorresSanSebastian
          - Alameda181

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.set_project.outputs.env_name }}
    steps:
      - id: set_project
        run: |
          ENV_NAME="${{ github.event.inputs.project || (github.ref == 'refs/heads/alameda181' && 'Alameda181' || 'TorresSanSebastian') }}"
          echo "env_name=$ENV_NAME" >> $GITHUB_OUTPUT

  build:
    needs: setup
    environment: ${{ needs.setup.outputs.env_name }}
    uses: ./.github/workflows/reusable-build.yml
    with:
      path_env: ${{ vars.PATH_ENV }}
    secrets:
      PROPERTIES_REPO_TOKEN: ${{ secrets.PROPERTIES_REPO_TOKEN }}

  deploy:
    needs: [setup, build]
    environment: ${{ needs.setup.outputs.env_name }}
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      project_name: ${{ vars.PROJECT_NAME }}
    secrets:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

  tag:
    needs: [build, deploy]
    permissions:
      contents: write
    uses: ./.github/workflows/reusable-tag.yml
    with:
      version: ${{ needs.build.outputs.version }}
