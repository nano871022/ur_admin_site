<main class="container mx-auto px-4 py-8">
  <!-- BEGIN: TopStatsSection -->
  <section class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8" data-purpose="attendance-stats">
    <!-- Attendance Count Chart Placeholder -->
    <mat-card class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col items-center justify-center">
      <h3 class="text-slate-500 font-semibold uppercase tracking-wider text-xs mb-4">Asistencia (Personas)</h3>
      <div class="relative w-48 h-48 mb-4">
        <svg class="w-full h-full" viewBox="0 0 36 36">
          <path class="text-slate-100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="3"></path>
          <path class="text-blue-600" [attr.stroke-dasharray]="stats.quorumPercentage + ', 100'" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="3"></path>
        </svg>
        <div class="absolute inset-0 flex flex-col items-center justify-center">
          <span class="text-3xl font-bold text-slate-800">{{ stats.attendanceCount }}</span>
          <span class="text-xs text-slate-400">de {{ stats.totalUnits }}</span>
        </div>
      </div>
      <p class="text-sm text-slate-600 italic">Quórum actual: {{ stats.quorumPercentage }}%</p>
    </mat-card>

    <!-- Co-owner Percentage Chart Placeholder -->
    <mat-card class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col items-center justify-center">
      <h3 class="text-slate-500 font-semibold uppercase tracking-wider text-xs mb-4">Representación Co-propiedad</h3>
      <div class="relative w-48 h-48 mb-4">
        <svg class="w-full h-full" viewBox="0 0 36 36">
          <path class="text-slate-100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="3"></path>
          <path class="text-emerald-500" [attr.stroke-dasharray]="stats.coefficientPercentage + ', 100'" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="3"></path>
        </svg>
        <div class="absolute inset-0 flex flex-col items-center justify-center">
          <span class="text-3xl font-bold text-slate-800">{{ stats.coefficientPercentage }}%</span>
          <span class="text-xs text-slate-400">Total Coeficiente</span>
        </div>
      </div>
      <p class="text-sm text-slate-600 italic">Mínimo requerido: {{ stats.minRequiredPercentage }}%</p>
    </mat-card>
  </section>
  <!-- END: TopStatsSection -->

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    <!-- BEGIN: QuestionsSidebar (Now on the left) -->
    <aside class="lg:col-span-1" data-purpose="questions-management">
      <div class="flex flex-col h-full gap-4">
        <button mat-raised-button color="primary" class="w-full !bg-emerald-600 hover:!bg-emerald-700 !text-white !font-bold !py-8 !px-6 !rounded-xl shadow-md btn-transition flex items-center justify-center gap-3" id="btnAddQuestion" (click)="openCreateSurveyPopup()">
          <mat-icon>add</mat-icon>
          Agregar Nueva Pregunta
        </button>

        <app-survey-history class="flex-1"></app-survey-history>
      </div>
    </aside>
    <!-- END: QuestionsSidebar -->

    <!-- BEGIN: ActiveSurveyInfo (Now on the right/center) -->
    <section class="lg:col-span-2" data-purpose="current-survey-status">
      <app-current-survey [totalRegisteredUsers]="stats.totalUnits"></app-current-survey>
    </section>
    <!-- END: ActiveSurveyInfo -->
  </div>
</main>
