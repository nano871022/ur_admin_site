name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select project to deploy'
        required: true
        default: 'TorresSanSebastian'
        type: choice
        options:
          - TorresSanSebastian
          - Alameda181

jobs:
   build:
    uses: ./.github/workflows/reusable-build.yml
    with:
      environment: ${{ github.event.inputs.environment || 'TorresSanSebastian' }}
    secrets:
      PROPERTIES_REPO_TOKEN: ${{ secrets.PROPERTIES_REPO_TOKEN }}

   deploy:
    needs: build
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: ${{ github.event.inputs.environment || 'TorresSanSebastian' }}
    secrets:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

   tag:
    needs: deploy
    uses: ./.github/workflows/reusable-tag.yml
    permissions:
      contents: write
    with:
      environment: ${{ github.event.inputs.environment  || 'TorresSanSebastian' }}
