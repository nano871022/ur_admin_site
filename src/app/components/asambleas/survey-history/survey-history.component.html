<div class="survey-history-container">
  <div *ngFor="let item of history" class="survey-card">
    <div class="survey-header">
      <h4 class="survey-question">{{ item.question }}</h4>
      <div class="survey-actions">
        <button class="action-btn edit-btn" disabled title="Edit disabled - votes cast" (click)="editSurvey(item.id)">
          <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
          </svg>
        </button>
        <button class="action-btn delete-btn" title="Delete" (click)="deleteSurvey(item.id)">
          <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
          </svg>
        </button>
      </div>
    </div>
    <div class="survey-footer">
      <span class="winner-badge">Ganador: {{ item.mostVotedOption }}</span>
      <div class="survey-stats">
        <span class="duration">Duración: {{ item.timeUsed }} min</span>
        <span class="percentage">{{ item.mostVotedCoefficient }}%</span>
      </div>
    </div>
  </div>
</div>
