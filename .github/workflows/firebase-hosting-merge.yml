name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
      - alameda181
  workflow_dispatch:
    inputs:
      project:
        description: 'Select project to deploy'
        required: true
        default: 'torressansebastian'
        type: choice
        options:
          - torressansebastian
          - alameda181

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      project_name: ${{ steps.set_project.outputs.project_name }}
      project_id: ${{ steps.set_project.outputs.project_id }}
    steps:
      - id: set_project
        run: |
          PROJECT_NAME="${{ github.event.inputs.project || (github.ref == 'refs/heads/alameda181' && 'alameda181' || 'torressansebastian') }}"
          echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT
          if [ "$PROJECT_NAME" == "alameda181" ]; then
            echo "project_id=cralameda181" >> $GITHUB_OUTPUT
          else
            echo "project_id=torressansebastian" >> $GITHUB_OUTPUT
          fi

  build:
    uses: ./.github/workflows/reusable-build.yml
    secrets:
      PROPERTIES_REPO_TOKEN: ${{ secrets.PROPERTIES_REPO_TOKEN }}

  deploy:
    needs: [setup, build]
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      project_id: ${{ needs.setup.outputs.project_id }}
    secrets:
      FIREBASE_SERVICE_ACCOUNT: ${{ needs.setup.outputs.project_name == 'alameda181' && secrets.FIREBASE_SERVICE_ACCOUNT_ALAMEDA181 || secrets.FIREBASE_SERVICE_ACCOUNT_TORRESSANSEBASTIAN }}

  tag:
    needs: [build, deploy]
    permissions:
      contents: write
    uses: ./.github/workflows/reusable-tag.yml
    with:
      version: ${{ needs.build.outputs.version }}
