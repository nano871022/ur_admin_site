name: Deploy to Firebase Hosting on merge
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select project to deploy'
        required: true
        default: 'TorresSanSebastian'
        type: choice
        options:
          - TorresSanSebastian
          - Alameda181

jobs:
   build:
    uses: ./.github/workflows/reusable-build.yml
    with:
      environment: ${{ github.event.inputs.environment || 'TorresSanSebastian' }}
    secrets: inherit

   deploy:
    needs: build
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: ${{ github.event.inputs.environment || 'TorresSanSebastian' }}
    secrets: inherit

   tag:
    needs: deploy
    uses: ./.github/workflows/reusable-tag.yml
    secrets: inherit
    permissions:
      contents: write
    with:
      environment: ${{ github.event.inputs.environment  || 'TorresSanSebastian' }}
